<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good42 Apps - Simple & Warm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <style>
      body {
        font-family: "Pretendard", sans-serif;
      }
      .app-card {
        transition: transform 0.3s ease;
      }
      .app-card:hover {
        transform: translateY(-5px);
      }
      [lang="ko"] :not([lang="ko"]),
      [lang="en"] :not([lang="en"]) {
        display: none;
      }
      /* Ensure combined lang containers work */
      [lang="ko"] .lang-ko, [lang="en"] .lang-en { display: inline-block; }
      [lang="ko"] .lang-en, [lang="en"] .lang-ko { display: none; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <!-- Language Toggle -->
    <div class="fixed top-4 right-4 z-50">
      <button
        onclick="toggleLanguage()"
        class="bg-white/80 backdrop-blur-sm border border-gray-200 px-3 py-1.5 rounded-full shadow-sm text-sm font-medium hover:bg-gray-50 transition"
      >
        <span class="lang-en">🇰🇷 한국어</span>
        <span class="lang-ko">🇺🇸 English</span>
      </button>
    </div>

    <!-- Hero Section -->
    <header class="py-16 px-4 text-center bg-white border-b border-gray-100">
      <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl">
        <span class="lang-ko">안녕하세요, 좋은사이(Good42)입니다.</span>
        <span class="lang-en">Hello, we are Good42.</span>
      </h1>
      <p class="mt-4 text-lg text-gray-600">
        <span class="lang-ko">일상에 가치를 더하는 심플하고 따뜻한 앱을 만듭니다.</span>
        <span class="lang-en">We create simple and warm apps that add value to your daily life.</span>
      </p>
    </header>

    <main id="app-container" class="max-w-4xl mx-auto py-16 px-4 space-y-24"></main>

    <footer class="bg-white border-t border-gray-100 py-12 px-4">
      <div class="max-w-5xl mx-auto text-center space-y-4">
        <p class="text-gray-500">
          © 2026 INHO SHIN (Good42). All rights reserved.
        </p>
        <div id="footer-links" class="flex justify-center flex-wrap gap-x-6 gap-y-2 text-sm text-gray-400"></div>
      </div>
    </footer>

    <script>
      const appsData = [
        {
          id: "scoreboard",
          category: { ko: "스포츠", en: "Sports", color: "green" },
          title: "Scoreboard: Live & Share",
          subtitle: { ko: "함께 즐기는 실시간 경기 점수판", en: "Real-time scoreboard for everyone" },
          description: {
            ko: "탁구, 배드민턴 등 다양한 스포츠의 점수를 실시간으로 기록하고 공유하세요.<br/>실시간으로 어디서든 경기를 함께 즐길 수 있습니다.",
            en: "Record and share scores for various sports like table tennis and badminton in real-time.<br/>Enjoy the match together from anywhere in real-time."
          },
          features: [
            { ko: "🏓 <strong>실시간 연동</strong>으로 멀리서도 점수 확인", en: "🏓 Check scores from afar with <strong>real-time synchronization</strong>" },
            { ko: "📱 <strong>방 번호, QR코드</strong>를 통한 간편한 점수판 정보 공유", en: "📱 Easy sharing of scoreboard information via <strong>Room Number, QR Code</strong>" },
            { ko: "📊 경기 결과를 <strong>이미지로 저장</strong>하고 공유", en: "📊 <strong>Save and share</strong> match results as images" },
            { ko: "🌍 <strong>7개 언어</strong> 지원 및 다국어 환경 제공", en: "🌍 <strong>7 languages</strong> supported for a global experience" }
          ],
          stores: [
            { type: "appstore", status: "coming-soon", href: "#" },
            { type: "googleplay", status: "coming-soon", href: "#" }
          ],
          images: {
            icon: "assets/images/scoreboard-icon.png",
            screenshot: "assets/screenshots/scoreboard.png",
            label: "scoreboard"
          },
          privacy: {
            ko: { label: "Scoreboard 개인정보 처리방침", url: "https://ninos.notion.site/31c98f0367808013a165cb79e2c08480" },
            en: { label: "Scoreboard Privacy Policy", url: "https://ninos.notion.site/Privacy-Policy-31c98f0367808095bb45c5d4e1eff611" }
          }
        },
        {
          id: "pomotime",
          category: { ko: "생산성", en: "Productivity", color: "red" },
          title: "Pomotime: Focus Timer",
          subtitle: { ko: "집중을 위한 가장 심플한 뽀모도로 타이머", en: "The simplest Pomodoro timer for focus" },
          description: {
            ko: '"심플하지만 강력한 집중의 도구, Pomotime"<br/>복잡한 설정은 생략하고 오직 \'집중\'에만 몰입하세요.',
            en: '"A simple but powerful tool for focus, Pomotime"<br/>Skip complex settings and immerse yourself in "Focus".'
          },
          features: [
            { ko: "🔥 <strong>불꽃 아이콘</strong>으로 집중 시간을 직관적으로 표시", en: "🔥 Intuitively display focus time with the <strong>Flame icon</strong>" },
            { ko: "🌿 <strong>나뭇잎 아이콘</strong>으로 리프레시 시간을 확인", en: "🌿 Check refresh time with the <strong>Leaf icon</strong>" },
            { ko: "✨ 작업에 방해되지 않는 <strong>미니멀 디자인</strong>", en: "✨ <strong>Minimal design</strong> that doesn't distract from your work" },
            { ko: "⚙️ 내 컨디션에 맞춘 <strong>커스텀 타이머</strong> 설정", en: "⚙️ <strong>Custom timer</strong> settings tailored to your condition" }
          ],
          stores: [
            { type: "appstore", status: "active", href: "https://apps.apple.com/kr/app/pomotime-focus-timer/id6758915328" },
            { type: "googleplay", status: "coming-soon", href: "#" }
          ],
          images: {
            icon: "assets/images/pomotime-icon.png",
            screenshot: "assets/screenshots/pomotime.png",
            label: "pomotime"
          },
          privacy: {
            ko: { label: "Pomotime 개인정보 처리방침", url: "https://ninos.notion.site/Pomotime-30298f0367808009a746e6d41db60cd1" },
            en: { label: "Pomotime Privacy Policy", url: "https://ninos.notion.site/Pomotime-30298f0367808009a746e6d41db60cd1" }
          }
        },
        {
          id: "diary",
          category: { ko: "소셜 네트워킹", en: "Social Networking", color: "blue" },
          title: "Shared Diary",
          subtitle: { ko: "함께 쓰는 일기", en: "Journaling Together" },
          description: {
            ko: "당신의 일기장에 소중한 사람을 초대해 보세요. 서로의 기록을 엮어 하나의 추억으로 간직해봐요.",
            en: "Invite your loved ones to your diary. Stitch your records together and keep them as a single memory."
          },
          features: [
            { ko: "🏠 <strong>나만의 공간</strong>에서 자유롭게 작성", en: "🏠 Write freely in <strong>your own space</strong>" },
            { ko: "👥 가족, 친구, 연인을 초대하여 <strong>함께 쓰는 일기</strong>", en: "👥 <strong>Write together</strong> by inviting family, friends, or partners" },
            { ko: "🎁 매일의 작은 이야기를 나누는 <strong>공유의 즐거움</strong>", en: "🎁 <strong>The joy of sharing</strong> everyday little stories" },
            { ko: "📦 소중한 기억을 담는 <strong>추억 보물상자</strong>", en: "📦 A <strong>treasure box of memories</strong> containing precious moments" }
          ],
          stores: [
            { type: "appstore", status: "active", href: "https://apps.apple.com/kr/app/%EA%B3%B5%EC%9C%A0%EC%9D%BC%EA%B8%B0/id6474495000" }
          ],
          images: {
            icon: "assets/images/diary-icon.png",
            screenshot: "assets/screenshots/diary.png",
            label: "shared diary"
          },
          privacy: {
            all: { label: "공유일기 개인정보 처리방침", url: "https://exchange-diary.imweb.me/?mode=privacy" }
          }
        }
      ];

      function renderBadge(category) {
        return `
          <div class="inline-block px-3 py-1 bg-${category.color}-100 text-${category.color}-600 text-sm font-semibold rounded-full">
            <span class="lang-ko">${category.ko}</span>
            <span class="lang-en">${category.en}</span>
          </div>
        `;
      }

      function renderStoreButton(store) {
        const isAppStore = store.type === "appstore";
        const isComingSoon = store.status === "coming-soon";

        const baseClasses = "inline-flex items-center px-6 py-3 border text-base font-medium rounded-md transition shadow-sm";
        const activeClasses = isAppStore
          ? "border-transparent text-white bg-black hover:bg-gray-800"
          : "border-gray-200 text-gray-900 bg-white hover:bg-gray-50";
        const disabledClasses = isAppStore
          ? "border-transparent text-white bg-black/80 cursor-default"
          : "border-gray-200 text-gray-900 bg-white/80 cursor-default";

        const icon = isAppStore
          ? `<svg class="w-5 h-5 mr-3 -mt-1" fill="currentColor" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>`
          : `<svg class="w-5 h-5 mr-3 -mt-0.5" viewBox="0 0 512 512">
              <path fill="#00A1F1" d="M25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l256.6-256L47 0c-13 6.8-21.7 19.2-21.7 35.3z"/>
              <path fill="#FBBC05" d="M472.2 225.6l-58.9-34.1-65.7 64.5 65.7 64.5 60.1-34.1c18-14.3 18-46.5-1.2-60.8z"/>
              <path fill="#34A853" d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1z"/>
              <path fill="#EA4335" d="M104.6 499l220.7-221.3 60.7 60.7L104.6 512c0 0-0.0-13-0.0-13z"/>
            </svg>`;

        if (isComingSoon) {
          return `
            <div class="${baseClasses} ${disabledClasses}">
              ${icon}
              <div class="flex flex-col items-start leading-tight">
                <span class="text-[10px] font-normal opacity-60">
                  <span class="lang-ko">곧 출시 예정</span>
                  <span class="lang-en">Coming Soon</span>
                </span>
                <span class="font-bold">${isAppStore ? "App Store" : "Google Play"}</span>
              </div>
            </div>
          `;
        }

        return `
          <a href="${store.href}" target="_blank" class="${baseClasses} ${activeClasses}">
            ${icon}
            <span class="font-bold">${isAppStore ? "App Store" : "Google Play"}</span>
          </a>
        `;
      }

      function renderPhoneFrame(images) {
        return `
          <div class="flex-1 w-full max-w-[280px] text-center group cursor-pointer mx-auto">
            <div class="aspect-[9/19.5] bg-white rounded-[3rem] shadow-2xl border-[12px] border-gray-900 flex flex-col items-center justify-center relative overflow-hidden mb-6 mx-auto">
              <div class="absolute top-4 w-20 h-1.5 bg-gray-900 rounded-full z-20"></div>
              <img src="${images.icon}" alt="${images.label} Icon" class="w-20 h-20 rounded-[1.2rem] shadow-xl mb-4 transition-transform group-hover:scale-110 duration-500" />
              <div class="px-6"><p class="text-gray-400 text-xs uppercase tracking-widest">${images.label}</p></div>
              <img src="${images.screenshot}" alt="${images.label} Screenshot" class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10" onerror="this.style.display='none'" />
            </div>
          </div>
        `;
      }

      function renderAppSection(app, index) {
        const isReverse = index % 2 !== 0; // Alternate layout
        const rowClass = isReverse ? "md:flex-row-reverse" : "md:flex-row";
        const textAlignClass = isReverse ? "text-right md:text-left" : "text-left";
        const justifyClass = isReverse ? "justify-end md:justify-start" : "justify-start";

        return `
          <section class="flex flex-col ${rowClass} items-center gap-24">
            <div class="flex-1 space-y-6 ${textAlignClass}">
              ${renderBadge(app.category)}
              <h2 class="text-3xl font-bold">${app.title}</h2>
              <p class="text-xl text-gray-600 font-medium">
                <span class="lang-ko">${app.subtitle.ko}</span>
                <span class="lang-en">${app.subtitle.en}</span>
              </p>
              <div class="text-gray-600 space-y-4 leading-relaxed">
                <p>
                  <span class="lang-ko">${app.description.ko}</span>
                  <span class="lang-en">${app.description.en}</span>
                </p>
                <ul class="list-none md:list-disc list-inside space-y-1 ml-0 md:ml-2">
                  ${app.features.map(f => `
                    <li>
                      <span class="lang-ko">${f.ko}</span>
                      <span class="lang-en">${f.en}</span>
                    </li>
                  `).join('')}
                </ul>
              </div>
              <div class="pt-4 flex flex-wrap gap-3 ${justifyClass}">
                ${app.stores.map(s => renderStoreButton(s)).join('')}
              </div>
            </div>
            ${renderPhoneFrame(app.images)}
          </section>
          ${index < appsData.length - 1 ? '<hr class="border-gray-100" />' : ''}
        `;
      }

      function init() {
        // Render App Sections
        const container = document.getElementById('app-container');
        container.innerHTML = appsData.map((app, i) => renderAppSection(app, i)).join('');

        // Render Footer Links
        const footerLinks = document.getElementById('footer-links');
        footerLinks.innerHTML = appsData.map(app => {
          if (app.privacy.all) {
            return `<a href="${app.privacy.all.url}" target="_blank" class="hover:text-gray-600 underline">${app.privacy.all.label}</a>`;
          }
          return `
            <a href="${app.privacy.ko.url}" target="_blank" class="hover:text-gray-600 underline lang-ko">${app.privacy.ko.label}</a>
            <a href="${app.privacy.en.url}" target="_blank" class="hover:text-gray-600 underline lang-en">${app.privacy.en.label}</a>
          `;
        }).join('');

        updateLanguage();
      }

      function updateLanguage() {
        const lang = localStorage.getItem("preferred-language") || (navigator.language.startsWith("ko") ? "ko" : "en");
        document.documentElement.setAttribute("lang", lang);
      }

      function toggleLanguage() {
        const currentLang = document.documentElement.getAttribute("lang");
        const newLang = currentLang === "en" ? "ko" : "en";
        localStorage.setItem("preferred-language", newLang);
        updateLanguage();
      }

      // Start the app
      init();
    </script>
  </body>
</html>
